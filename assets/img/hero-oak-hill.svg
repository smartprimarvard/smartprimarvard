<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 760 620" role="img" aria-labelledby="title desc">
  <title id="title">En stor ek på en kulle</title>
  <desc id="desc">En lugn illustration av en stor ek på en mjukt böljande kulle med en låg sol bakom trädet.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.58" stop-color="#E6F0F7"/>
      <stop offset="1" stop-color="#D6E6F1"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF8DE"/>
      <stop offset="1" stop-color="#F5D995"/>
    </linearGradient>
    <linearGradient id="hillBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FB1A4"/>
      <stop offset="1" stop-color="#5B8775"/>
    </linearGradient>
    <linearGradient id="hillFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#316851"/>
      <stop offset="1" stop-color="#174C3A"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0B2E4F" flood-opacity="0.14"/>
    </filter>
    <clipPath id="sceneClip"><rect x="0" y="0" width="760" height="620" rx="30"/></clipPath>
  </defs>
  <g clip-path="url(#sceneClip)">
    <rect width="760" height="620" fill="url(#sky)"/>
    <circle cx="510" cy="244" r="124" fill="url(#sun)" opacity="0.95"/>
    <circle cx="510" cy="244" r="158" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.52"/>
    <path d="M-80 490 C90 392 228 405 365 471 C510 540 655 448 840 392 L840 700 L-80 700 Z" fill="url(#hillBack)" opacity="0.78"/>
    <path d="M-60 556 C118 453 279 464 408 526 C544 591 676 534 820 456 L820 700 L-60 700 Z" fill="url(#hillFront)"/>
    <path d="M-40 559 C132 475 286 480 408 538 C542 601 676 549 806 482" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.20"/>
    <g opacity="0.45" fill="#FFFFFF">
      <ellipse cx="144" cy="164" rx="62" ry="16"/>
      <ellipse cx="184" cy="164" rx="41" ry="12"/>
      <ellipse cx="114" cy="165" rx="31" ry="11"/>
    </g>
    <g filter="url(#softShadow)">
      <image x="80" y="84" width="560" height="284" preserveAspectRatio="xMidYMid meet" xlink:href="tree-detailed.png" href="tree-detailed.png"/>
    </g>
    <path d="M344 372 C376 360 414 360 448 373" fill="none" stroke="#0B2E4F" stroke-width="4" stroke-linecap="round" opacity="0.22"/>
    <g fill="#FFFFFF" opacity="0.75">
      <circle cx="680" cy="112" r="4"/><circle cx="694" cy="104" r="3"/><circle cx="704" cy="116" r="2.5"/>
    </g>
  </g>
  <rect x="1" y="1" width="758" height="618" rx="29" fill="none" stroke="#C9D8E4" stroke-width="2"/>
</svg>
